<svg width="1080" height="460" viewBox="0 0 1080 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <linearGradient id="nodeA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="nodeB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="nodeC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="460" rx="22" fill="url(#bg)"/>

  <text x="36" y="58" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Application Data Flow</text>
  <text x="36" y="86" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">How data moves through the Streamlit dashboard</text>

  <rect x="36" y="136" width="218" height="110" rx="14" fill="url(#nodeA)" stroke="#7DD3FC"/>
  <text x="54" y="172" fill="#0C4A6E" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">CSV Source</text>
  <text x="54" y="198" fill="#075985" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Motor_Vehicle_Collisions</text>
  <text x="54" y="219" fill="#075985" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">_Crashes.csv</text>

  <rect x="314" y="136" width="220" height="110" rx="14" fill="url(#nodeB)" stroke="#93C5FD"/>
  <text x="332" y="172" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Data Loader</text>
  <text x="332" y="198" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">@st.cache_data</text>
  <text x="332" y="219" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Date normalization + cleaning</text>

  <rect x="594" y="136" width="220" height="110" rx="14" fill="url(#nodeC)" stroke="#C4B5FD"/>
  <text x="612" y="172" fill="#5B21B6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Filter Engine</text>
  <text x="612" y="198" fill="#6D28D9" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Sidebar controls</text>
  <text x="612" y="219" fill="#6D28D9" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Borough, dates, hour, injuries</text>

  <rect x="852" y="136" width="196" height="110" rx="14" fill="#E2E8F0" stroke="#CBD5E1"/>
  <text x="870" y="172" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Dashboard UI</text>
  <text x="870" y="198" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">KPI cards + tabs</text>
  <text x="870" y="219" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Charts and maps</text>

  <path d="M 254 191 L 304 191" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 534 191 L 584 191" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 814 191 L 842 191" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="36" y="286" width="1012" height="130" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="58" y="320" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Rendered Visual Modules</text>
  <text x="58" y="350" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">1) Geospatial View: Injury map + hour-based hexagon layer</text>
  <text x="58" y="374" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">2) Time Patterns: Minute histogram, daily trend, weekday-hour heatmap</text>
  <text x="58" y="398" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">3) Risk &amp; Causes: Top affected streets, borough split, contributing factors</text>
</svg>
